<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI4Students 2026 – Vibe Coding Projects</title>
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --accent: #38bdf8;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    header p {
      color: var(--text-muted);
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    h2 {
      font-size: 1.25rem;
      color: var(--accent);
      margin: 2.5rem 0 1rem;
      border-bottom: 1px solid #334155;
      padding-bottom: 0.5rem;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
      list-style: none;
    }

    .projects a {
      display: flex;
      flex-direction: column;
      background: var(--card-bg);
      border-radius: 0.75rem;
      text-decoration: none;
      color: var(--text);
      font-size: 1.125rem;
      font-weight: 500;
      overflow: hidden;
      transition: background 0.2s, transform 0.2s;
    }

    .projects a img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
    }

    .projects a span {
      padding: 1rem 1.25rem;
    }

    .projects a:hover,
    .projects a:focus-visible {
      background: var(--accent);
      color: var(--bg);
      transform: translateY(-2px);
    }

    .notice {
      max-width: 960px;
      margin: 0 auto 2rem;
      background: #1e293b;
      border-left: 4px solid var(--accent);
      padding: 1rem 1.25rem;
      border-radius: 0.5rem;
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .notice code {
      background: #0f172a;
      padding: 0.15em 0.4em;
      border-radius: 0.25rem;
      font-size: 0.9em;
      color: var(--text);
    }
  </style>
</head>
<body>
  <header>
    <h1>Vibe Coding Projects</h1>
    <p>AI4Students 2026</p>
  </header>

  <p class="notice">
    If some features don't work when opening files directly, try running a local web server.
    Run <code>python3 server.py</code> at the project root, then visit
    <code>http://localhost:5500</code>.
  </p>

  <div class="container">
    <h2>Games</h2>
    <ul class="projects">
      <li><a href="endless-runner/index.html"><img src="endless-runner/assets/thumbnail.png" alt="Endless Runner preview"><span>Endless Runner</span></a></li>
      <li><a href="dungeon-crawler/index.html"><img src="dungeon-crawler/assets/thumbnail.png" alt="Dungeon Crawler preview"><span>Dungeon Crawler</span></a></li>
      <li><a href="memory-card-match/index.html"><img src="memory-card-match/assets/thumbnail.png" alt="Memory Card Match preview"><span>Memory Card Match</span></a></li>
    </ul>
  </div>
</body>
</html>
